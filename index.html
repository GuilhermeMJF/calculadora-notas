<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Notas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Média de Notas</h1>

    <form>
    <p> Nome do Aluno: <input type="text" id="nome" placeholder="Digite seu nome" required></p>
   
    <p> Nota 1: <input type="number" id="nota1" step="0.1" min="0" max="10" placeholder="Nota1" required></p>
    <p> Nota 2: <input type="number" id="nota2" step="0.1" min="0" max="10" placeholder="Nota2" required></p>

    <input type="submit" value="Calcular Média">
    </form>
    
    <h2 id="outMedia"></h2>
    <h3 id="outSituacao"></h3>

    <script src="scripts/script.js"></script>
</body>
</html>
